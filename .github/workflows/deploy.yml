name: Deploy Frontend

# Adjust the branch name below if your default branch isn't "main".
on:
  push:
    branches: [main]
  # Lets you trigger a deploy manually from the Actions tab without a push.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Vite/Vue CLI both default to outputting into `dist/`. If your
        # project outputs somewhere else (e.g. `build/`), change every
        # "dist" below to match.

      - name: Deploy dist/ to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist/*"
          target: ${{ secrets.DROPLET_DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      # Static files only — Nginx picks up the new files on the next
      # request automatically, no reload needed. Uncomment below only if
      # you actually change nginx.conf itself as part of this deploy.
      # - name: Reload Nginx
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.DROPLET_HOST }}
      #     username: ${{ secrets.DROPLET_USER }}
      #     key: ${{ secrets.DROPLET_SSH_KEY }}
      #     script: sudo systemctl reload nginx
